name: Daily Metrics Sync
on:
  schedule:
    - cron: '30 23 * * *' # Runs at 11:30 PM UTC every day
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Dependencies
        run: npm install @sanity/client @octokit/rest dotenv
      - name: Run Sync Script
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node scripts/sync-metrics.mjs