name: Daily Metrics Sync
on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Updated to v4 for Node 24 support
      - uses: actions/checkout@v4 
      
      # 2. Updated to v4 and bumped to Node 24
      - uses: actions/setup-node@v4
        with:
          node-version: 24 

      # 3. Added --legacy-peer-deps to bypass the Next.js 16 conflict
      - name: Install Dependencies
        run: npm install @sanity/client @octokit/rest dotenv --legacy-peer-deps

      - name: Run Sync Script
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node scripts/sync-metrics.mjs